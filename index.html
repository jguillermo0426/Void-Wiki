<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon Void — Wiki</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2307060f'/%3E%3Ccircle cx='32' cy='32' r='18' fill='%238a5cff'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23e9e4ff'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Silkscreen:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #07060f;
    color: #e9e4ff;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }
  /* fixed cosmic backdrop */
  #bg {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 20% -5%, #1a1140 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 95% 10%, #10243e 0%, transparent 50%),
      #07060f;
  }
  #bg::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, #fff7, transparent),
      radial-gradient(1px 1px at 24% 64%, #fff5, transparent),
      radial-gradient(1px 1px at 47% 28%, #fff6, transparent),
      radial-gradient(2px 2px at 62% 78%, #b89bff66, transparent),
      radial-gradient(1px 1px at 78% 36%, #fff5, transparent),
      radial-gradient(1px 1px at 90% 84%, #fff4, transparent),
      radial-gradient(1px 1px at 36% 92%, #fff5, transparent);
    background-size: 100% 100%;
    opacity: 0.8;
  }
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: #0a0818; }
  ::-webkit-scrollbar-thumb { background: #2a2350; border-radius: 6px; border: 3px solid #0a0818; }
  ::-webkit-scrollbar-thumb:hover { background: #3a2f6e; }
  input::placeholder { color: #6a6388; }
  a { color: inherit; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="wiki/data-dex.js"></script>
<script src="wiki/data-game.js"></script>
<script type="text/babel" src="wiki/ui.jsx"></script>
<script type="text/babel" src="wiki/view-pokedex.jsx"></script>
<script type="text/babel" src="wiki/view-detail.jsx"></script>
<script type="text/babel" src="wiki/view-moves.jsx"></script>
<script type="text/babel" src="wiki/view-abilities.jsx"></script>
<script type="text/babel" src="wiki/view-items.jsx"></script>
<script type="text/babel" src="wiki/view-routes.jsx"></script>
<!-- <script type="text/babel" src="wiki/view-trainers.jsx"></script> -->
<script type="text/babel" src="wiki/view-types.jsx"></script>

<script type="text/babel">
  const { NavBar } = window.VUI;

  function parseHash(h) {
    const clean = (h || '').replace(/^#\/?/, '');
    const parts = clean.split('/').filter(Boolean);
    return { view: parts[0] || 'pokedex', param: parts[1] || null };
  }

  function App() {
    const [hash, setHash] = React.useState(window.location.hash || '#/pokedex');
    const [query, setQuery] = React.useState('');
    React.useEffect(() => {
      const f = () => setHash(window.location.hash || '#/pokedex');
      window.addEventListener('hashchange', f);
      if (!window.location.hash) window.location.hash = '#/pokedex';
      return () => window.removeEventListener('hashchange', f);
    }, []);
    const { view, param } = parseHash(hash);
    React.useEffect(() => { window.scrollTo(0, 0); }, [view, param]);

    const V = window.VIEWS;
    let content;
    switch (view) {
      case 'pokemon': content = <V.Detail param={param} />; break;
      case 'moves': content = <V.Moves />; break;
      case 'abilities': content = <V.Abilities />; break;
      case 'items': content = <V.Items />; break;
      case 'locations': content = <V.Locations />; break;
      case 'location': content = <V.Location param={param} />; break;
      // case 'trainers': content = <V.Trainers />; break;
      case 'types': content = <V.Types />; break;
      case 'pokedex':
      default: content = <V.Pokedex query={query} />;
    }

    return (
      <React.Fragment>
        <NavBar route={'/' + view + (param ? '/' + param : '')} query={query} setQuery={setQuery} />
        <main style={{ maxWidth: 1240, margin: '0 auto', padding: '32px 24px 80px' }}>{content}</main>
        <footer style={{ maxWidth: 1240, margin: '0 auto', padding: '24px', borderTop: '1px solid #1d1838', color: '#5f5980', fontFamily: "'Space Mono', monospace", fontSize: 12, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
          <span>POKÉMON VOID · Fan Wiki — placeholder data &amp; sprites</span>
        </footer>
      </React.Fragment>
    );
  }

  // Load sprite manifest (lists dex numbers that have a sprites/<dex>.png) so we
  // only request images that exist — keeps the console clean until art is added.
  fetch('sprites/manifest.json')
    .then(r => r.ok ? r.json() : [])
    .catch(() => [])
    .then(list => {
      window.SPRITE_SET = new Set((list || []).map(String));
      window.SPRITE_VERSION = Array.from(window.SPRITE_SET).join('-');
    })
    .finally(() => { ReactDOM.createRoot(document.getElementById('root')).render(<App />); });
</script>
</body>
</html>
